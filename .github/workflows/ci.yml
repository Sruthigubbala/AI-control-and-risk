name: Contract Intelligence CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v3

    - name: Set up Python Runtime
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        # install project deps via the same python interpreter
        python -m pip install -r requirements.txt
        # install test/runtime extras and spaCy (pin if you want reproducible runs)
        python -m pip install pytest httpx spacy==3.6.1
        # download the language model after spaCy is installed
        python -m spacy download en_core_web_sm    

    - name: Install System Utilities
      run: |
        sudo apt-get update
        sudo apt-get install -y tesseract-ocr poppler-utils

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest httpx
        python -m spacy download en_core_web_sm

    - name: Execute Automated Test Suite
      run: |
        pytest -v

    - name: Log Build Status
      run: echo "CI Verification Matrix Passed Successfully. Ready for AWS EC2 Container Deployment."